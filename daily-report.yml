name: Daily NPA Report

on:
  schedule:
    # 03:30 UTC == 03:30 Accra (Ghana is UTC+0, no DST)
    - cron: '30 3 * * *'
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-job.txt

      - name: Write .env (only used for per_bdc mode; harmless otherwise)
        run: printf '%s' "$DOTENV" > .env
        env:
          DOTENV: ${{ secrets.DOTENV }}

      - name: Run daily report job
        env:
          NPA_USER_ID:            ${{ secrets.NPA_USER_ID }}
          NPA_COMPANY_ID:         ${{ secrets.NPA_COMPANY_ID }}
          NPA_APP_ID:             ${{ secrets.NPA_APP_ID }}
          NPA_ITS_FROM_PERSOL:    ${{ secrets.NPA_ITS_FROM_PERSOL }}
          NPA_BDC_BALANCE_URL:    ${{ secrets.NPA_BDC_BALANCE_URL }}
          NPA_OMC_LOADINGS_URL:   ${{ secrets.NPA_OMC_LOADINGS_URL }}
          REPORT_FETCH_MODE:      ${{ secrets.REPORT_FETCH_MODE }}
          REPORT_LOADINGS_DAYS_BACK: ${{ secrets.REPORT_LOADINGS_DAYS_BACK }}
          OMC_NAME:               ${{ secrets.OMC_NAME }}
          WHATSAPP_PROVIDER:      ${{ secrets.WHATSAPP_PROVIDER }}
          WHAPI_TOKEN:            ${{ secrets.WHAPI_TOKEN }}
          WHATSAPP_GROUP_ID:      ${{ secrets.WHATSAPP_GROUP_ID }}
        run: python daily_report_job.py

      - name: Upload generated PDFs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: report_output/*.pdf
          if-no-files-found: ignore
          retention-days: 14
