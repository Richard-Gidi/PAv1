name: Daily NPA Report

on:
  schedule:
    # 3:30 UTC == 3:30 AM Accra (Ghana is UTC+0, no DST)
    - cron: '30 3 * * *'
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-job.txt

      - name: Recreate .env from secret
        env:
          DOTENV: ${{ secrets.DOTENV }}
        run: printf '%s' "$DOTENV" > .env

      - name: Sanity-check .env (shows presence only, never values)
        run: |
          echo ".env line count: $(wc -l < .env)"
          grep -q '^WHAPI_TOKEN=' .env        && echo "WHAPI_TOKEN: present"        || echo "WHAPI_TOKEN: MISSING"
          grep -q '^WHATSAPP_GROUP_ID=' .env  && echo "WHATSAPP_GROUP_ID: present"  || echo "WHATSAPP_GROUP_ID: MISSING"
          grep -q '^NPA_USER_ID=' .env        && echo "NPA_USER_ID: present"        || echo "NPA_USER_ID: MISSING"

      - name: Run daily report job
        run: python daily_report_job.py

      - name: Upload generated PDFs as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: report_output/*.pdf
          if-no-files-found: ignore
          retention-days: 14